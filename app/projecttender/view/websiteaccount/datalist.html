{extend name="../../base/view/common/base" /}
<!-- 主体 -->
{block name="body"}
<div class="p-page">
	<!-- 搜索栏与新增按钮同行布局 -->
	<div class="layui-form gg-search-form" lay-filter="searchForm" style="margin-bottom: 10px;">
		<div class="layui-form-item" style="margin-bottom: 0;">
			<div class="layui-inline">
				<label class="layui-form-label" style="width: auto; padding-right: 10px;">网址</label>
				<div class="layui-input-inline" style="width: 200px;">
					<input type="text" name="website_url" placeholder="请输入网址关键词搜索" class="layui-input">
				</div>
			</div>
			<div class="layui-inline">
				<button class="layui-btn layui-btn-normal" lay-submit lay-filter="doSearch">搜索</button>
				<button class="layui-btn layui-btn-primary" type="reset">重置</button>
			</div>
			<div class="layui-inline" style="float: right;">
				<button class="layui-btn layui-btn-sm layui-btn-normal tool-import" type="button">
					<i class="layui-icon">&#xe67c;</i> 导入Excel
				</button>
				<button class="layui-btn layui-btn-sm tool-add" type="button" data-href="/projecttender/websiteaccount/add">+ 添加招投标网址注册信息</button>
			</div>
		</div>
	</div>

	<table class="layui-hide" id="table_oa_website_account" lay-filter="table_oa_website_account"></table>
</div>

<!-- Excel导入弹窗 -->
<div id="importExcelModal" style="display: none; padding: 20px;">
	<div class="layui-form-item">
		<label class="layui-form-label">下载模板</label>
		<div class="layui-input-block">
			<a href="/projecttender/websiteaccount/exportTemplate" class="layui-btn layui-btn-primary layui-btn-sm">
				<i class="layui-icon">&#xe601;</i> 下载Excel模板
			</a>
			<div class="layui-form-mid layui-word-aux" style="margin-top: 10px;">
				请先下载模板，按照模板格式填写数据后再导入
			</div>
		</div>
	</div>
	<hr>
	<div class="layui-form-item">
		<label class="layui-form-label">选择文件</label>
		<div class="layui-input-block">
			<button type="button" class="layui-btn layui-btn-sm" id="importFileBtn">
				<i class="layui-icon">&#xe67c;</i> 选择Excel文件
			</button>
			<div class="layui-upload-list" style="margin-top: 10px;">
				<p id="uploadFileName" style="color: #666;"></p>
			</div>
		</div>
	</div>
	<input type="file" id="importFile" accept=".xlsx,.xls" style="display: none;">
</div>
{/block}
<!-- /主体 -->

<!-- 脚本 -->
{block name="script"}
<script>
	const moduleInit = ['tool', 'upload']; // 新增upload模块
	function gouguInit() {
		// 加载layui核心模块
		var table = layui.table,
				form = layui.form,
				tool = layui.tool,
				layer = layui.layer,
				upload = layui.upload,
				$ = layui.$;

		// 渲染表格（使用标准table组件，弃用treeTable）
		layui.pageTable = table.render({
			elem: "#table_oa_website_account",
			title: '招投标网址注册信息列表',
			url: "/projecttender/websiteaccount/datalist", // 正确的接口地址
			method: 'post', // 统一使用post请求
			page: true, // 开启分页
			limit: 10, // 每页默认10条
			limits: [10, 20, 50], // 分页条数选择
			where: {
				website_url: $('input[name="website_url"]').val() // 初始化搜索参数
			},
			cols: [[
				{field: 'id', width: 80, title: 'ID号', align: 'center', fixed: 'left'},
				{field: 'sort', width: 80, title: '排序', align: 'center'},
				{field: 'website_name', minWidth: 200, title: '网站名称'},
				{field: 'website_url', minWidth: 300, title: '网址', templet: function(d) {
						// 网址渲染为可点击链接，兼容空值
						if (!d.website_url) return '-';
						return `<a href="${d.website_url}" target="_blank" class="layui-blue">${d.website_url}</a>`;
					}},
				{field: 'username', width: 120, title: '用户名', align: 'center'},
				{field: 'password', width: 180, title: '密码', align: 'center'},
				{field: 'has_uk', width: 100, title: '是否有UK', align: 'center', templet: function(d) {
						// 格式化是否有UK的显示
						return d.has_uk ? d.has_uk : '-';
					}},
				{field: 'remark', minWidth: 200, title: '说明', templet: function(d) {
						// 说明字段为空时显示-
						return d.remark ? d.remark : '-';
					}},
				{width: 120, title: '操作', align: 'center', fixed: 'right', templet: function(d) {
						var btn1 = '<button class="layui-btn layui-bg-blue layui-btn-xs" lay-event="edit">编辑</button>';
						var btn4 = '<button class="layui-btn layui-bg-red layui-btn-xs" lay-event="del">删除</button>';
						return `<div class="layui-btn-group">${btn1}${btn4}</div>`;
					}}
			]],
			done: function(res, curr, count) {
				// 表格渲染完成回调
				if (count === 0) {
					// 无数据时提示
					layer.msg('暂无招投标网址注册信息', {icon: 6, time: 1500});
				}
			}
		});

		// ========== 新增：Excel导入功能 ==========
		// 导入按钮点击事件
		$('.tool-import').click(function() {
			layer.open({
				type: 1,
				title: 'Excel导入',
				area: ['500px', '300px'],
				content: $('#importExcelModal'),
				btn: ['确认导入', '取消'],
				success: function(layero, index) {
					// 重置文件选择
					$('#importFile').val('');
					$('#uploadFileName').text('');
				},
				yes: function(index, layero) {
					var file = $('#importFile')[0].files[0];
					if (!file) {
						layer.msg('请选择要导入的Excel文件', {icon: 2});
						return;
					}

					// 验证文件类型
					var fileName = file.name;
					var ext = fileName.substring(fileName.lastIndexOf('.')).toLowerCase();
					if (ext !== '.xlsx' && ext !== '.xls') {
						layer.msg('请选择Excel格式的文件（.xlsx/.xls）', {icon: 2});
						return;
					}

					// 构建FormData
					var formData = new FormData();
					formData.append('file', file);

					// 显示加载层
					var loadIndex = layer.load(2);

					// 提交导入请求
					$.ajax({
						url: '/projecttender/websiteaccount/importExcel',
						type: 'POST',
						data: formData,
						contentType: false,
						processData: false,
						dataType: 'json',
						success: function(res) {
							layer.close(loadIndex);
							if (res.code === 0) {
								layer.msg(res.msg, {icon: 1});
								layer.close(index);
								// 刷新表格
								layui.pageTable.reload();
							} else {
								layer.msg(res.msg, {icon: 2});
							}
						},
						error: function() {
							layer.close(loadIndex);
							layer.msg('导入失败，请重试', {icon: 2});
						}
					});
				}
			});
		});

		// 文件选择按钮
		$('#importFileBtn').click(function() {
			$('#importFile').click();
		});

		// 文件选择事件
		$('#importFile').change(function() {
			var file = this.files[0];
			if (file) {
				$('#uploadFileName').text('已选择：' + file.name);
			} else {
				$('#uploadFileName').text('');
			}
		});
		// ========== Excel导入功能结束 ==========

		// 监听搜索表单提交
		form.on('submit(doSearch)', function(data) {
			// 重载表格，携带搜索参数并重置页码
			table.reload('table_oa_website_account', {
				page: { curr: 1 },
				where: {
					website_url: $.trim(data.field.website_url) // 去除首尾空格
				}
			});
			return false; // 阻止表单默认提交
		});

		// 监听重置按钮
		$('button[type="reset"]').click(function() {
			// 清空搜索框并重载表格
			$('input[name="website_url"]').val('');
			table.reload('table_oa_website_account', {
				page: { curr: 1 },
				where: { website_url: '' }
			});
		});

		// 监听表格工具条事件
		table.on('tool(table_oa_website_account)', function(obj) {
			var data = obj.data; // 当前行数据
			if (obj.event === 'edit') {
				// 编辑操作：打开侧边弹窗
				tool.side("/projecttender/websiteaccount/add?id=" + data.id);
			} else if (obj.event === 'del') {
				// 删除操作：确认弹窗
				layer.confirm('确定要删除这条招投标网址信息吗？', {
					icon: 3,
					title: '删除确认',
					btn: ['确认', '取消']
				}, function(index) {
					// 确认删除
					let callback = function(e) {
						layer.msg(e.msg);
						if (e.code == 0) {
							// 删除成功后刷新表格
							layui.pageTable.reload();
						}
					};
					// 调用删除接口
					tool.delete("/projecttender/websiteaccount/del", {id: data.id}, callback);
					layer.close(index);
				});
			}
		});
	}
</script>
{/block}
<!-- /脚本 -->
